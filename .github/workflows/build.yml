name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        run: |
          sudo apt-get install -y wget unzip
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p $HOME/android-sdk/cmdline-tools/latest
          mv cmdline-tools/* $HOME/android-sdk/cmdline-tools/latest/
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Download MP3s
        run: |
          mkdir -p app/src/main/res/raw
          cd app/src/main/res/raw
          BASE="https://github.com/ObaidBaloch79/Zemer_AlhanYakk/releases/download/songs"
          for i in 1 2 3 4 5 6 7 8; do
            curl -L "${BASE}/song${i}.mp3" -o "song${i}.mp3"
          done

      - name: Setup Gradle Wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          export PATH=$PATH:$PWD/gradle-8.2/bin
          gradle wrapper
          chmod +x gradlew

      - name: Build APK
        env:
          ANDROID_HOME: /root/android-sdk
        run: |
          export PATH=$PATH:$PWD/gradle-8.2/bin
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: ZemerAlhanYakk-APK
          path: app/build/outputs/apk/debug/app-debug.apk
